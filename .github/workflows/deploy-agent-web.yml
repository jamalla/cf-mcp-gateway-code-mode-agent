name: Deploy Agent Web to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/agent-web/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_MCP_GATEWAY_URL: https://cf-mcp-gateway.to-jamz.workers.dev
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy app
        run: pnpm --filter @apps/agent-web run deploy
